# ===========================================
# Dengarkan.id — Local Development Override
# Menambahkan Caddy sebagai reverse proxy
#
# Digabung otomatis saat docker compose up
# ===========================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: dengarkan-caddy
    environment:
      - RELOAD_CADDY=1
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      cms:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app-net
    restart: unless-stopped
